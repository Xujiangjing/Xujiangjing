name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # GitHub Stats
      - name: Generate stats card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=Xujiangjing&show_icons=true&theme=default'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # Top Languages
      - name: Generate top langs
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: top-langs
          options: 'username=Xujiangjing&layout=compact'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      # WakaTime
      - name: Generate wakatime
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: wakatime
          options: 'username=Xujiangjing&layout=compact'
          path: profile/wakatime.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
